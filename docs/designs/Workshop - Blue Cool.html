  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

lyline><\u002Fsvg><\u002Fdiv>\n              <sc-for list=\"{{ tools }}\" as=\"b\" hint-placeholder-count=\"6\">\n                <div style=\"width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#4A5567;font-size:13px;font-weight:{{ b.weight }};font-style:{{ b.italic }};\" style-hover=\"background:#EDF1F6;\">{{ b.label }}<\u002Fdiv>\n              <\u002Fsc-for>\n              <div style=\"flex:1;\"><\u002Fdiv>\n              <span style=\"font-size:11.5px;color:#939DAE;display:flex;align-items:center;gap:5px;\"><span style=\"width:6px;height:6px;border-radius:50%;background:#1FA971;\"><\u002Fspan>Saved<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"flex:1;min-height:0;overflow-y:auto;padding:34px 44px;\">\n              <div contenteditable=\"true\" style=\"max-width:660px;margin:0 auto;outline:none;color:#1F2734;\" spellcheck=\"false\">\n                <div style=\"font-size:26px;font-weight:700;letter-spacing:-.01em;margin-bottom:6px;\">EMA Crossover — EUR/USD<\u002Fdiv>\n                <div style=\"font-size:13px;color:#8893A4;margin-bottom:24px;\">Strategy brief · last edited just now<\u002Fdiv>\n                <div style=\"font-size:16px;font-weight:600;margin:0 0 8px;\">Thesis<\u002Fdiv>\n                <p style=\"font-size:14px;line-height:1.7;margin:0 0 18px;\">Trade the trend on the EUR/USD 1-minute chart. Go long when a fast moving average crosses above a slow one, and flatten when it crosses back below. The pair is liquid through the London open, so signals fill cleanly with tight spreads.<\u002Fp>\n                <div style=\"font-size:16px;font-weight:600;margin:0 0 8px;\">Entry &amp; exit rules<\u002Fdiv>\n                <ul style=\"font-size:14px;line-height:1.7;margin:0 0 18px;padding-left:22px;\">\n                  <li><b>Enter long<\u002Fb> when EMA(21) crosses above EMA(50).<\u002Fli>\n                  <li><b>Exit<\u002Fb> when EMA(21) crosses below EMA(50).<\u002Fli>\n                  <li>Risk one lot per entry; no pyramiding.<\u002Fli>\n                <\u002Ful>\n                <div style=\"font-size:16px;font-weight:600;margin:0 0 8px;\">Risk<\u002Fdiv>\n                <p style=\"font-size:14px;line-height:1.7;margin:0 0 18px;\">Stop loss 12 pips below entry, take profit 24 pips above. Only one position open at a time. Skip the first five minutes after major economic releases.<\u002Fp>\n                <div style=\"border-left:3px solid #2563EB;background:#F4F8FE;border-radius:0 8px 8px 0;padding:12px 16px;font-size:13.5px;line-height:1.6;color:#4A5567;\">Backtest target: the most recent 07:00 London session. Compare against buy-and-hold over the same window.<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <!-- CHAT PANE (right) -->\n      <div id=\"chatPane\" style=\"flex:0 0 100%;min-width:0;display:flex;flex-direction:column;background:#F6F8FB;border-left:1px solid #E2E8F0;position:relative;overflow:hidden;\">\n\n        <!-- COLLAPSED STRIP — shown when chat is minimised to the right -->\n        <sc-if value=\"{{ chatCollapsed }}\" hint-placeholder-val=\"{{ false }}\">\n        <div onclick=\"{{ expandChat }}\" title=\"Expand chat\" style=\"position:absolute;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;background:#F6F8FB;cursor:pointer;\" style-hover=\"background:#EDF1F6;\">\n          <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#6B7588\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"11 17 6 12 11 7\"><\u002Fpolyline><polyline points=\"18 17 13 12 18 7\"><\u002Fpolyline><\u002Fsvg>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ALWAYS-ON NAV: Chat / Strategy / Data / Brokers -->\n        <div style=\"height:46px;flex:none;display:flex;align-items:stretch;padding:0 4px;border-bottom:1px solid #E2E8F0;background:#fff;\" data-comment-anchor=\"c5e1e30c82-div\">\n          <div onclick=\"{{ tabChatGo }}\" style=\"display:flex;align-items:center;gap:6px;padding:0 13px;font-size:13px;font-weight:500;cursor:pointer;color:{{ nChat.color }};border-bottom:2px solid {{ nChat.border }};margin-bottom:-1px;white-space:nowrap;\" style-hover=\"color:#161D2B;\">\n            <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z\"><\u002Fpath><\u002Fsvg>\n            Chat\n          <\u002Fdiv>\n          <div onclick=\"{{ tabStrategyGo }}\" style=\"display:flex;align-items:center;gap:6px;padding:0 13px;font-size:13px;font-weight:500;cursor:pointer;color:{{ nStrat.color }};border-bottom:2px solid {{ nStrat.border }};margin-bottom:-1px;white-space:nowrap;\" style-hover=\"color:#161D2B;\">\n            <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"22 12 18 12 15 21 9 3 6 12 2 12\"><\u002Fpolyline><\u002Fsvg>\n            Strategy\n          <\u002Fdiv>\n          <div onclick=\"{{ tabDataGo }}\" style=\"display:flex;align-items:center;gap:6px;padding:0 13px;font-size:13px;font-weight:500;cursor:pointer;color:{{ nData.color }};border-bottom:2px solid {{ nData.border }};margin-bottom:-1px;white-space:nowrap;\" style-hover=\"color:#161D2B;\">\n            <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><ellipse cx=\"12\" cy=\"5\" rx=\"9\" ry=\"3\"><\u002Fellipse><path d=\"M21 12c0 1.66-4 3-9 3s-9-1.34-9-3M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5\"><\u002Fpath><\u002Fsvg>\n            Data\n          <\u002Fdiv>\n rgba(0,0,0,.13);z-index:30;overflow:hidden;\">\n            <div style=\"padding:10px 13px 7px;font-size:11px;font-weight:700;letter-spacing:.06em;color:#939DAE;\">PREVIOUS SESSIONS<\u002Fdiv>\n            <div style=\"padding:0 6px 6px;display:flex;flex-direction:column;gap:1px;max-height:280px;overflow-y:auto;\">\n              <sc-for list=\"{{ sessions }}\" as=\"s\" hint-placeholder-count=\"4\">\n                <div onclick=\"{{ s.onClick }}\" style=\"display:flex;align-items:center;gap:9px;padding:8px 9px;border-radius:8px;cursor:pointer;background:{{ s.bg }};\" style-hover=\"background:#EDF1F6;\">\n                  <span style=\"width:7px;height:7px;flex:none;border-radius:50%;background:{{ s.dot }};\"><\u002Fspan>\n                  <div style=\"flex:1;min-width:0;\">\n                    <div style=\"font-size:12.5px;font-weight:{{ s.weight }};color:#2A3340;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\">{{ s.title }}<\u002Fdiv>\n                    <div style=\"font-size:11px;color:#8893A4;\">{{ s.meta }}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"border-top:1px solid #E7ECF2;padding:5px 6px;\">\n              <div style=\"display:flex;align-items:center;gap:7px;padding:8px 9px;border-radius:8px;font-size:12px;color:#4A5567;cursor:pointer;\" style-hover=\"background:#EDF1F6;\">\n                <svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 3v5h5\"><\u002Fpath><path d=\"M3.05 13A9 9 0 1 0 6 5.3L3 8\"><\u002Fpath><\u002Fsvg>\n                View all sessions\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n\n        <div id=\"chatThread\" style=\"flex:1;min-height:0;overflow-y:auto;\">\n          <sc-if value=\"{{ showEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:24px;text-align:center;\">\n            <div style=\"width:46px;height:46px;border-radius:13px;background:#E4EDFC;display:flex;align-items:center;justify-content:center;\">\n              <svg width=\"25\" height=\"25\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#2563EB\" stroke-width=\"2.1\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"3 17 9 11 13 15 21 7\"><\u002Fpolyline><polyline points=\"15 7 21 7 21 13\"><\u002Fpolyline><\u002Fsvg>\n            <\u002Fdiv>\n            <div style=\"font-size:17px;font-weight:600;color:#2A3340;\">Describe your strategy to begin<\u002Fdiv>\n            <div style=\"font-size:13px;color:#8893A4;max-width:368px;line-height:1.6;\">Tell me about a strategy in the box below, attach a document that describes it, or write one up yourself. I'll set up the data, write the code, and run a backtest.<\u002Fdiv>\n            <div style=\"display:flex;gap:10px;margin-top:4px;\">\n              <div onclick=\"{{ attachDoc }}\" style=\"display:flex;align-items:center;gap:7px;border:1px solid #D8DFE8;background:#fff;border-radius:10px;padding:9px 14px;font-size:13px;font-weight:600;color:#2A3340;cursor:pointer;\" style-hover=\"background:#EDF1F6;border-color:#CBD3DF;\">\n                <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#6B7588\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48\"><\u002Fpath><\u002Fsvg>\n                Attach document\n              <\u002Fdiv>\n              <div onclick=\"{{ writeDoc }}\" style=\"display:flex;align-items:center;gap:7px;background:#2563EB;color:#fff;border-radius:10px;padding:9px 14px;font-size:13px;font-weight:600;cursor:pointer;box-shadow:0 ctive · 2 min ago' },\n    { title: 'GBP/USD breakout test', meta: 'Yesterday · 14 messages' },\n    { title: 'BTC momentum + RSI filter', meta: 'Tuesday · 9 messages' },\n    { title: 'Mean reversion sweep', meta: 'Last week · 21 messages' },\n  ];\n\n  QUESTIONS = [\n    { key: 'pair', label: 'Pair & timeframe', opts: [\n        { t: 'EUR/USD · 1 min', pair: 'EUR/USD', tf: 'm1' },\n        { t: 'GBP/USD · 5 min', pair: 'GBP/USD', tf: 'm5' },\n        { t: 'BTC/USD · 15 min', pair: 'BTC/USD', tf: 'm15' } ] },\n    { key: 'dir', label: 'Direction', opts: [ { t: 'Long only' }, { t: 'Long & short' } ] },\n    { key: 'sma', label: 'SMA lengths', opts: [ { t: '9 / 21' }, { t: '5 / 13' }, { t: '20 / 50' } ] },\n  ];\n  SMA_MAP = [[9, 21], [5, 13], [20, 50]];\n\n  setQa(key, idx) { this.setState(s => ({ qa: { ...s.qa, [key]: idx } })); }\n\n  submitAnswers(m) {\n    if (!m.pending) return;\n    m.pending = false;\n    const qa = this.state.qa;\n    const pairOpt = this.QUESTIONS[0].opts[qa.pair];\n    const [f, sl] = this.SMA_MAP[qa.sma];\n    const summary = this.QUESTIONS.map(q => q.opts[qa[q.key]].t).join('   ·   ');\n    this.state.messages.push({ id: 'm' + (this._mid++), isUser: true, text: summary });\n    this.setState({ pairOverride: pairOpt.pair, tf: pairOpt.tf, fastSMA: f, slowSMA: sl, allowShort: qa.dir === 1, responding: true });\n    requestAnimationFrame(() => this.scrollBottom());\n    this.runResponse();\n  }\n\n  DOCS = [\n    { k: 'ema_crossover', name: 'EMA Crossover — EUR/USD.md' },\n    { k: 'risk_policy', name: 'Risk policy.md' },\n    { k: 'research_notes', name: 'Research notes.md' },\n    { k: 'mean_reversion', name: 'Mean reversion idea.md' },\n  ];\n  TOOLS = [\n    { label: 'B', weight: '700', italic: 'normal' },\n    { label: 'I', weight: '500', italic: 'italic' },\n    { label: 'H', weight: '700', italic: 'normal' },\n    { label: '“', weight: '600', italic: 'normal' },\n    { label: '•', weight: '600', italic: 'normal' },\n    { label: '↺', tionFrame(step); }\n      else { cp.style.flex = closing ? '0 0 100%' : '0 0 ' + toW + 'px'; this._draw(); }\n    };\n    this._tw = requestAnimationFrame(step);\n  }\n\n  genCandles() {\n    let price = 1.1508, seed = 7;\n    const rnd = () => { seed = (seed * 1103515245 + 12345) & 0x7fffffff; return seed / 0x7fffffff; };\n    const out = [];\n    for (let i = 0; i < 160; i++) {\n      const drift = Math.sin(i / 13) * 0.00015 + (i < 78 ? 0.000055 : -0.00007);\n      const o = price, c = o + (rnd() - 0.5) * 0.0005 + drift;\n      const h = Math.max(o, c) + rnd() * 0.0003, l = Math.min(o, c) - rnd() * 0.0003;\n      out.push({ o, h, l, c }); price = c;\n    }\n    return out;\n  }\n  sma(data, n) { return data.map((_, i) => { if (i < n - 1) return null; let s = 0; for (let k = 0; k < n; k++) s += data[i - k].c; return s / n; }); }\n\n  drawFull() {\n    const cv = document.getElementById('fullChart'); if (!cv) return;\n    const r = cv.getBoundingClientRect(); if (r.width < 4 || r.height < 4) return;\n    const dpr = window.devicePixelRatio || 1;\n    cv.width = Math.round(r.width * dpr); cv.height = Math.round(r.height * dpr);\n    const ctx = cv.getContext('2d'); ctx.setTransform(dpr, 0, 0, dpr, 0, 0);\n    const W = r.width, H = r.height; ctx.clearRect(0, 0, W, H);\n    const data = this._candles;\n    const padT = 10, padB = 26, padL = 8, padR = 64;\n    const plotW = W - padL - padR, plotH = H - padT - padB;\n    let lo = Infinity, hi = -Infinity;\n    data.forEach(d => { lo = Math.min(lo, d.l); hi = Math.max(hi, d.h); });\n    const pad = (hi - lo) * 0.08; lo -= pad; hi += pad;\n    const x = i => padL + (i + 0.5) * (plotW / data.length);\n    const y = p => padT + (hi - p) / (hi - lo) * plotH;\n    ctx.font = '11px ui-monospace, Menlo, monospace'; ctx.textBaseline = 'middle';\n    for (let g = 0; g <= 4; g++) {\n      const p = lo + (hi - lo) * g / 4, yy = y(p);\n      ctx.strokeStyle = '#E9EEF4'; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(padL, yy); ctx.lineTo(padL + plotW, yy); ctx.stroke();\n      ctx.fillStyle = '#939DAE'; ctx.textAlign = 'left'; ctx.fillText(p.toFixed(4), padL + plotW + 8, yy);\n    }\n    const cw = Math.max(1.6, (plotW / data.length) * 0.62);\n    data.forEach((d, i) => {\n      const up = d.c >= d.o, col = up ? '#1FA971' : '#E5484D', xc = x(i);\n      ctx.strokeStyle = col; ctx.fillStyle = col; ctx.lineWidth = 1;\n      ctx.beginPath(); ctx.moveTo(xc, y(d.h)); ctx.lineTo(xc, y(d.l)); ctx.stroke();\n      const yo = y(d.o), yc = y(d.c); ctx.fillRect(xc - cw / 2, Math.min(yo, yc), cw, Math.max(1, Math.abs(yc - yo)));\n    });\n    const line = (arr, color, w) => {\n      ctx.strokeStyle = color; ctx.lineWidth = w; ctx.beginPath(); let st = false;\n      arr.forEach((v, i) => { if (v == null) return; const px = x(i), py = y(v); if (!st) { ctx.moveTo(px, py); st = true; } else ctx.lineTo(px, py); });\n      ctx.stroke();\n    };\n    line(this.sma(data, this.state.fastSMA), '#2563EB', 1.4);\n    line(this.sma(data, this.state.slowSMA), '#9DBAF2', 1.4);\n    const mk = (i, buy) => {\n      const d = data[i]; if (!d) return;\n      const px = x(i), py = y(buy ? d.l : d.h) + (buy ? 18 : -18);\n      ctx.beginPath(); ctx.arc(px, py, 8, 0, 7); ctx.fillStyle = '#fff'; ctx.fill();\n      ctx.lineWidth = 1.6; ctx.strokeStyle = buy ? '#2563EB' : '#E5484D'; ctx.stroke();\n      ctx.beginPath();\n      if (buy) { ctx.moveTo(px, py + 3.2); ctx.lineTo(px, py - 3.2); ctx.moveTo(px - 3, py - 0.3); ctx.lineTo(px, py - 3.4); ctx.lineTo(px + 3, py - 0.3); }\n      else { ctx.moveTo(px, py - 3.2); ctx.lineTo(px, py + 3.2); ctx.moveTo(px - 3, py + 0.3); ctx.lineTo(px, py + 3.4); ctx.lineTo(px + 3, py + 0.3); }\n      ctx.stroke();\n    };\n    this._buys.forEach(i => mk(i, true)); this._sells.forEach(i => mk(i, false));\n    const last = data[data.length - 1].c, ly = y(last);\n    ctx.strokeStyle = '#2563EB'; ctx.setLineDash([4, 3]); ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(padL, ly); ctx.lineTo(padL + plotW, ly); ctx.stroke(); ctx.setLineDash([]);\n    ctx.fillStyle = '#2563EB'; ctx.fillRect(padL + plotW, ly - 9, padR - 2, 18);\n    ctx.fillStyle = '#fff'; ctx.textAlign = 'left'; ctx.fillText(last.toFixed(4), padL + plotW + 6, ly);\n  }\n\n  drawMinis() {\n    document.querySelectorAll('[data-minichart]').forEach(cv => {\n      const r = cv.getBoundingClientRect(); if (r.width < 4 || r.height < 4) return;\n      const dpr = window.devicePixelRatio || 1;\n      cv.width = Math.round(r.width * dpr); cv.height = Math.round(r.height * dpr);\n      const ctx = cv.getContext('2d'); ctx.setTransform(dpr, 0, 0, dpr, 0, 0);\n      const W = r.width, H = r.height; ctx.clearRect(0, 0, W, H);\n      const data = this._candles.slice(-90);\n      let lo = Infinity, hi = -Infinity; data.forEach(d => { lo = Math.min(lo, d.l); hi = Math.max(hi, d.h); });\n      const pad = (hi - lo) * 0.12; lo -= pad; hi += pad;\n      const x = i => 4 + (i + 0.5) * ((W - 8) / data.length);\n      const y = p => 8 + (hi - p) / (hi - lo) * (H - 16);\n      const cw = Math.max(1.1, ((W - 8) / data.length) * 0.6);\n      data.forEach((d, i) => {\n        const up = d.c >= d.o, col = up ? '#1FA971' : '#E5484D', xc = x(i);\n        ctx.strokeStyle = col; ctx.fillStyle = col; ctx.lineWidth = 0.9;\n        ctx.beginPath(); ctx.moveTo(xc, y(d.h)); ctx.lineTo(xc, y(d.l)); ctx.stroke();\n        const yo = y(d.o), yc = y(d.c); ctx.fillRect(xc - cw / 2, Math.min(yo, yc), cw, Math.max(0.8, Math.abs(yc - yo)));\n      });\n      const f = this.sma(this._candles, this.state.fastSMA).slice(-90);\n      ctx.strokeStyle = '#2563EB'; ctx.lineWidth = 1.1; ctx.beginPath(); let st = false;\n      f.forEach((v, i) => { if (v == null) return; const px = x(i), py = y(v); if (!st) { ctx.moveTo(px, py); st = true; } else ctx.lineTo(px, py); });\n      ctx.stroke();\n    });\n  }\n\n  openArtifact(type) {\n    if (this.state.artifactOpen) { this.setState({ artifact: type }); return; }\n    this.setState({ artifactOpen: true, artifact: type });\n    requestAnimationFrame(() => this.animateChat(null, 420, false));\n  }\n  closeArtifact() {\n    if (!this.state.artifactOpen) return;\n    const to = this.state.containerW || (window.innerWidth - 57);\n    this.setState({ artifactOpen: false, chatCollapsed: false });\n    requestAnimationFrame(() => this.animateChat(null, to, true));\n  }\n  toggleArtifact(type) { if (this.state.artifactOpen && this.state.artifact === type) this.closeArtifact(); else this.openArtifact(type); }\n\n  _animatePx(cp, fromW, toW) {\n    if (!cp) return;\n    cancelAnimationFrame(this._tw);\n    const start = performance.now(), dur = 320;\n    const ease = t => t < .5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2;\n    const step = (now) => {\n      const t = Math.min(1, (now - start) / dur);\n      const w = fromW + (toW - fromW) * ease(t);\n      cp.style.flex = '0 0 ' + w + 'px';\n      this.drawFull();\n      if (t < 1) { this._tw = requestAnimationFrame(step); }\n      else { cp.style.flex = '0 0 ' + toW + 'px'; this._draw(); }\n    };\n    this._tw = requestAnimationFrame(step);\n  }\n\n  collapseChat() {\n    if (this.state.chatCollapsed) return;\n    const cp = document.getElementById('chatPane');\n    const fromW = cp ? cp.getBoundingClientRect().width : 420;\n    this.setState({ chatCollapsed: true });\n    requestAnimationFrame(() => this._animatePx(cp, fromW, 36));\n  }\n\n  expandChat() {\n    if (!this.state.chatCollapsed) return;\n    const cp = document.getElementById('chatPane');\n    this.setState({ chatCollapsed: false });\n    requestAnimationFrame(() => this._animatePx(cp, 36, 420));\n  }\n  setTabOpen(tab, type) {\n    const wasOpen = this.state.artifactOpen;\n    this.setState({ tab, artifactOpen: true, artifact: type });\n    if (!wasOpen) requestAnimationFrame(() => this.animateChat(null, 420, false));\n  }\n\n  pairLabel() { return this.state.pairOverride || this.props.pair || 'EUR/USD'; }\n  tfLabel() { const f = this.TF.find(t => t.k === this.state.tf); return f ? f.s : '1 minute'; }\n\n  // ---- chat animation engine ----\n  sleep(ms) { return new Promise(res => { this._timers.push(setTimeout(res, ms)); }); }\n  scrollBottom() { const el = document.getElementById('chatThread'); if (el) el.scrollTop = el.scrollHeight; }\n  bump() { this.forceUpdate(); requestAnimationFrame(() => this.scrollBottom()); }\n  push(msg) { this.state.messages.push(msg); this.bump(); }\n  setThinking(label) { this.setState({ thinking: true, thinkingLabel: label }); requestAnimationFrame(() => this.scrollBottom()); }\n  clearThinking() { this.setState({ thinking: false }); }\n\n  async typeText(full) {\n    const msg = { id: 'm' + (this._mid++), isText: true, text: '' };\n    this.push(msg);\n    for (let i = 1; i <= full.length; i++) {\n      msg.text = full.slice(0, i);\n      this.bump();\n      const ch = full[i - 1];\n      let d = 14 + Math.random() * 24;\n      if (ch === ' ') d += 8;\n      if ('.,—:'.indexOf(ch) >= 0) d += 130;\n      await this.sleep(d);\n    }\n  }\n  async addTool(toolName, toolSummary, onOpen) {\n    this.push({ id: 'm' + (this._mid++), isTool: true, toolName, toolSummary, onOpen });\n  }\n\n  async runClarify() {\n    await this.sleep(550);\n    this.setThinking('Thinking…');\n    await this.sleep(950);\n    this.clearThinking();\n    await this.typeText(\"Happy to build that. A few quick questions first so I set it up right:\");\n    await this.sleep(200);\n    this.push({ id: 'm' + (this._mid++), isQuestions: true, pending: true });\n    this.setState({ responding: false });\n  }\n\n  async runAttach() {\n    if (this.state.responding) return;\n    this.state.messages.push({ id: 'm' + (this._mid++), isFile: true, fileName: 'strategy-brief.docx', fileMeta: '42 KB · Word document' });\n    this.setState({ responding: true });\n    this.bump();\n    await this.sleep(550);\n    this.setThinking('Converting Word doc to compatible format…');\n    await this.sleep(1700);\n    this.clearThinking();\n    await t acktest over the most recent ' + iv + ' session…');\n    await this.sleep(450);\n    this.setThinking('Running backtest…');\n    await this.sleep(1700);\n    this.clearThinking();\n    this.push({ id: 'm' + (this._mid++), isBacktest: true, btMeta: pair + ' · ' + iv + ' · 07:00 session' });\n    await this.sleep(600);\n    await this.typeText('Returned +0.18% across 6 trades with a 67% win rate. Want me to optimise the SMA lengths or add a trend filter?');\n    this.setState({ responding: false });\n  }\n\n  resetChat() {\n    (this._timers || []).forEach(clearTimeout);\n    this._timers = [];\n    this.state.messages.length = 0;\n    this._clarified = false;\n    this.setState({ responding: false, thinking: false, input: '', pairOverride: null, qa: { pair: 0, dir: 1, sma: 0 } });\n  }\n\n  send() {\n    if (this.state.responding) return;\n    const v = (this.state.input || '').trim(); if (!v) return;\n    this.state.messages.push({ id: 'm' + (this._mid++), isUser: true, text: v });\n    this.setState({ input: '', responding: true });\n    requestAnimationFrame(() => this.scrollBottom());\n    if (!this._clarified) { this._clarified = true; this.runClarify(); }\n    else { this.runResponse(); }\n  }\n\n  renderVals() {\n    const open = this.state.artifactOpen, tab = this.state.tab, art = this.state.artifact, collapsed = this.state.chatCollapsed;\n    const A = '#2563EB', T = '#161D2B', M = '#5A6678';\n    const nav = on => ({ color: on ? A : M, border: on ? A : 'transparent' });\n    const rail = on => ({ c: on ? A : '#6B7588', b: on ? '#E4EDFC' : 'transparent' });\n\n    const tfOpts = this.TF.map(t => {\n      const on = this.state.tf === t.k;\n      return { label: t.k, color: on ? '#fff' : '#5A6678', bg: on ? A : 'transparent', weight: on ? '600' : '500', onClick: () => this.setState({ tf: t.k }) };\n    });\n\n    return {\n      artifactOpen: open,\n      artChart: art === 'chart', artCode: art === 'code', artDocs: art === 'docs', artFlow: art === 'flow',\n      showBottomPanel: this.props.showBottomPanel !== false,\n      messages: this.state.messages.map(m => {\n        if (m.isReview) return { ...m, done: !m.pending, onEdit: () => this.openArtifact('docs'), onApprove: () => this.approveReview(m) };\n        if (!m.isQuestions) return m;\n        const questions = this.QUESTIONS.map(q => ({\n          label: q.label,\n          opts: q.opts.map((o, i) => {\n            const on = this.state.qa[q.key] === i;\n            return { text: o.t,\n              bg: on ? '#E4EDFC' : '#fff', color: on ? '#1E40AF' : '#4A5567',\n              border: on ? '#2563EB' : '#D8DFE8', weight: on ? '600' : '500',\n              check: on ? '1' : '0', cursor: m.pending ? 'pointer' : 'default',\n              onClick: m.pending ? () => this.setQa(q.key, i) : () => {} };\n          }),\n        }));\n        return { ...m, questions, pending: m.pending, onSubmit: () => this.submitAnswers(m) };\n      }),\n      thinking: this.state.thinking, thinkingLabel: this.state.thinkingLabel,\n      showEmpty: this.state.messages.length === 0 && !this.state.responding,\n      responding: this.state.responding, input: this.state.input,\n\n      fastSMA: this.state.fastSMA, slowSMA: this.state.slowSMA,\n      posSize: this.state.posSize.toFixed(1),\n      stopLoss: String(this.state.stopLoss), takeProfit: String(this.state.takeProfit),\n      btWindow: this.state.btWindow, chartBroker: this.state.chartBroker, tfOpts,\n      shortBg: this.state.allowShort ? A : '#CDD5E0', shortKnobLeft: this.state.allowShort ? '20px' : '2px',\n\n      chartCardOpen: this.state.chartCardOpen,\n      chartCardChevronRot: this.state.chartCardOpen ? 'rotate(0deg)' : 'rotate(-90deg)',\n      toggleChartCard: () => this.setState(s => ({ chartCardOpen: !s.chartCardOpen })),\n      chartAreaFlex: this.state.bottomPanelExpanded ? '0 0 0' : '1',\n      bottomPanelFlex: this.state.bottomPanelExpanded ? '1 1 0' : 'none',\n      bottomPanelOverflow: this.state.bottomPanelExpanded ?
