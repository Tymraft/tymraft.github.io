{% assign _state = include.state | default: 'pending' %}
<li class="timeline-item">
  <div class="timeline-dot {{ _state }}">
    {% if _state == 'done' %}
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#059669" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
    {% elsif _state == 'active' %}
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#2563EB" stroke-width="2.5"><circle cx="12" cy="12" r="4"/></svg>
    {% else %}
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#DDE2EC" stroke-width="2.5"><circle cx="12" cy="12" r="4"/></svg>
    {% endif %}
  </div>
  <div class="timeline-content">
    <div class="timeline-date">{{ include.date }}</div>
    <div class="timeline-title">{{ include.title }}</div>
    {% if include.desc %}<div class="timeline-desc">{{ include.desc }}</div>{% endif %}
  </div>
</li>
