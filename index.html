<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tymraft Docs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0F1623;
      --surface:   #1A2332;
      --surface2:  #212E42;
      --border:    #2A3A52;
      --text:      #E8EDF5;
      --muted:     #8B9BB4;
      --accent:    #3B82F6;
      --accent-dim:#1D4ED8;
      --green:     #34D399;
      --yellow:    #FBBF24;
      --red:       #F87171;
      --purple:    #A78BFA;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 28px;
      height: 56px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo {
      font-weight: 600;
      font-size: 15px;
      letter-spacing: 0.04em;
      color: var(--text);
      text-transform: uppercase;
    }

    .logo span { color: var(--accent); }

    .header-sep {
      width: 1px;
      height: 20px;
      background: var(--border);
      margin: 0 4px;
    }

    .header-title {
      font-size: 14px;
      color: var(--muted);
    }

    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 12px;
      width: 220px;
    }

    .search-box input {
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      width: 100%;
    }

    .search-box input::placeholder { color: var(--muted); }

    .search-icon { color: var(--muted); flex-shrink: 0; }

    /* ── Layout ── */
    .layout {
      display: flex;
      flex: 1;
    }

    /* ── Sidebar ── */
    aside {
      width: 220px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 20px 0;
    }

    .nav-section {
      padding: 0 12px;
      margin-bottom: 4px;
    }

    .nav-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0 8px;
      margin-bottom: 6px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 8px;
      border-radius: 6px;
      font-size: 13px;
      color: var(--muted);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      user-select: none;
    }

    .nav-item:hover { background: var(--surface2); color: var(--text); }
    .nav-item.active { background: var(--surface2); color: var(--accent); }
    .nav-item svg { flex-shrink: 0; }

    /* ── Main ── */
    main {
      flex: 1;
      padding: 28px 32px;
      overflow: auto;
    }

    /* ── Breadcrumb ── */
    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 20px;
      font-family: 'JetBrains Mono', monospace;
    }

    .breadcrumb a {
      color: var(--accent);
      text-decoration: none;
    }

    .breadcrumb a:hover { text-decoration: underline; }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .toolbar-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .folder-title {
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
    }

    .file-count {
      font-size: 12px;
      color: var(--muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2px 10px;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 6px;
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: background 0.15s;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:hover { background: var(--accent-dim); }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover { background: var(--surface2); color: var(--text); }

    /* ── Table ── */
    .file-table {
      width: 100%;
      border-collapse: collapse;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .file-table thead tr {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .file-table th {
      padding: 10px 16px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }

    .file-table th:hover { color: var(--text); }

    .file-table th .sort-icon {
      display: inline-block;
      margin-left: 4px;
      opacity: 0.4;
      font-size: 10px;
    }

    .file-table th.sorted .sort-icon { opacity: 1; color: var(--accent); }

    .file-table tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.12s;
      cursor: pointer;
      position: relative;
    }

    .file-table tbody tr:last-child { border-bottom: none; }

    .file-table tbody tr:hover { background: var(--surface2); }

    .file-table tbody tr:hover td:first-child {
      border-left: 3px solid var(--accent);
      padding-left: 13px;
    }

    .file-table td {
      padding: 12px 16px;
      font-size: 13px;
      color: var(--text);
      border-left: 3px solid transparent;
      transition: border-color 0.12s, padding 0.12s;
    }

    /* ── File cell ── */
    .file-cell {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .file-icon {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .file-icon.md   { background: rgba(59,130,246,0.15); color: var(--accent); }
    .file-icon.pdf  { background: rgba(248,113,113,0.15); color: var(--red); }
    .file-icon.doc  { background: rgba(167,139,250,0.15); color: var(--purple); }
    .file-icon.xls  { background: rgba(52,211,153,0.15);  color: var(--green); }
    .file-icon.img  { background: rgba(251,191,36,0.15);  color: var(--yellow); }
    .file-icon.misc { background: rgba(139,155,180,0.15); color: var(--muted); }

    .file-name {
      font-weight: 500;
      font-size: 13px;
    }

    .file-name:hover { color: var(--accent); }

    .file-ext {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      margin-top: 1px;
    }

    /* ── Meta cells ── */
    .meta-cell {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--muted);
    }

    .size-badge {
      display: inline-block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--muted);
    }

    /* ── Actions ── */
    .row-actions {
      display: flex;
      gap: 4px;
      opacity: 0;
      transition: opacity 0.15s;
    }

    tr:hover .row-actions { opacity: 1; }

    .action-btn {
      padding: 4px 8px;
      border-radius: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 11px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: background 0.12s, color 0.12s;
    }

    .action-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .empty svg { opacity: 0.3; margin-bottom: 12px; }
    .empty p { font-size: 14px; }

    /* ── Stats bar ── */
    .stats-bar {
      display: flex;
      gap: 24px;
      padding: 14px 0;
      margin-top: 16px;
      border-top: 1px solid var(--border);
    }

    .stat {
      font-size: 12px;
      color: var(--muted);
    }

    .stat strong {
      color: var(--text);
      font-weight: 500;
    }
  </style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">Tym<span>raft</span></div>
  <div class="header-sep"></div>
  <div class="header-title">Documents</div>
  <div class="header-right">
    <div class="search-box">
      <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="searchInput" placeholder="Search documents..." />
    </div>
  </div>
</header>

<div class="layout">

  <!-- Sidebar -->
  <aside>
    <div class="nav-section">
      <div class="nav-label">Library</div>
      <div class="nav-item active">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        All Documents
      </div>
      <div class="nav-item">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        docs/
      </div>
    </div>
    <div class="nav-section" style="margin-top:16px">
      <div class="nav-label">Filter by type</div>
      <div class="nav-item" onclick="filterType('all')" id="filter-all">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        All types
      </div>
      <div class="nav-item" onclick="filterType('md')" id="filter-md">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Markdown
      </div>
    </div>
  </aside>

  <!-- Main -->
  <main>
    <div class="breadcrumb">
      <a href="#">tymraft.github.io</a>
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      <span>docs/</span>
    </div>

    <div class="toolbar">
      <div class="toolbar-left">
        <div class="folder-title">docs</div>
        <div class="file-count" id="fileCount">3 files</div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-ghost">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          List
        </button>
        <button class="btn btn-primary">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New file
        </button>
      </div>
    </div>

    <table class="file-table" id="fileTable">
      <thead>
        <tr>
          <th onclick="sortBy('name')" id="th-name">Name <span class="sort-icon">↕</span></th>
          <th onclick="sortBy('modified')" id="th-modified">Last modified <span class="sort-icon">↕</span></th>
          <th onclick="sortBy('size')" id="th-size">Size <span class="sort-icon">↕</span></th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="fileBody"></tbody>
    </table>

    <div class="stats-bar">
      <div class="stat"><strong id="statFiles">3</strong> files</div>
      <div class="stat"><strong id="statSize">—</strong> total</div>
      <div class="stat">Synced from <strong>github.com/Tymraft/tymraft.github.io</strong></div>
    </div>
  </main>
</div>

<script>
  const FILES = [
    {
      name: 'project-brief.md',
      ext: 'md',
      modified: '2026-06-28',
      size: 312,
      path: 'docs/project-brief.md'
    },
    {
      name: 'onboarding-guide.md',
      ext: 'md',
      modified: '2026-06-28',
      size: 489,
      path: 'docs/onboarding-guide.md'
    },
    {
      name: 'meeting-notes-2026-06-28.md',
      ext: 'md',
      modified: '2026-06-28',
      size: 541,
      path: 'docs/meeting-notes-2026-06-28.md'
    }
  ];

  let currentSort = { key: 'name', dir: 1 };
  let currentFilter = 'all';
  let searchTerm = '';

  function getIcon(ext) {
    const icons = {
      md: { cls: 'md', svg: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>' },
      pdf: { cls: 'pdf', svg: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>' },
      doc:  { cls: 'doc', svg: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>' },
    };
    return icons[ext] || { cls: 'misc', svg: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>' };
  }

  function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
  }

  function formatDate(str) {
    const d = new Date(str);
    return d.toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric' });
  }

  function totalSize(files) {
    return files.reduce((a, f) => a + f.size, 0);
  }

  function render() {
    let files = FILES.filter(f => {
      const matchType = currentFilter === 'all' || f.ext === currentFilter;
      const matchSearch = f.name.toLowerCase().includes(searchTerm.toLowerCase());
      return matchType && matchSearch;
    });

    files.sort((a, b) => {
      let av = a[currentSort.key], bv = b[currentSort.key];
      if (typeof av === 'string') av = av.toLowerCase();
      if (typeof bv === 'string') bv = bv.toLowerCase();
      return av < bv ? -currentSort.dir : av > bv ? currentSort.dir : 0;
    });

    const tbody = document.getElementById('fileBody');
    tbody.innerHTML = '';

    if (files.length === 0) {
      tbody.innerHTML = `<tr><td colspan="4"><div class="empty"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg><p>No documents found</p></div></td></tr>`;
    } else {
      files.forEach(f => {
        const icon = getIcon(f.ext);
        const ghUrl = `https://github.com/Tymraft/tymraft.github.io/blob/main/${f.path}`;
        const rawUrl = `https://raw.githubusercontent.com/Tymraft/tymraft.github.io/main/${f.path}`;
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>
            <div class="file-cell">
              <div class="file-icon ${icon.cls}">${icon.svg}</div>
              <div>
                <div class="file-name">${f.name}</div>
                <div class="file-ext">.${f.ext}</div>
              </div>
            </div>
          </td>
          <td class="meta-cell">${formatDate(f.modified)}</td>
          <td><span class="size-badge">${formatSize(f.size)}</span></td>
          <td>
            <div class="row-actions">
              <button class="action-btn" onclick="event.stopPropagation(); window.open('${ghUrl}','_blank')">View</button>
              <button class="action-btn" onclick="event.stopPropagation(); window.open('${rawUrl}','_blank')">Raw</button>
            </div>
          </td>
        `;
        tr.addEventListener('click', () => window.open(ghUrl, '_blank'));
        tbody.appendChild(tr);
      });
    }

    document.getElementById('fileCount').textContent = `${files.length} file${files.length !== 1 ? 's' : ''}`;
    document.getElementById('statFiles').textContent = files.length;
    document.getElementById('statSize').textContent = formatSize(totalSize(files));
  }

  function sortBy(key) {
    if (currentSort.key === key) {
      currentSort.dir *= -1;
    } else {
      currentSort = { key, dir: 1 };
    }
    document.querySelectorAll('.file-table th').forEach(th => th.classList.remove('sorted'));
    document.getElementById(`th-${key}`).classList.add('sorted');
    render();
  }

  function filterType(type) {
    currentFilter = type;
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    const el = document.getElementById(`filter-${type}`);
    if (el) el.classList.add('active');
    render();
  }

  document.getElementById('searchInput').addEventListener('input', e => {
    searchTerm = e.target.value;
    render();
  });

  render();
</script>
</body>
</html>
